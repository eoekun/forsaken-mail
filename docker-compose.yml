services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forsaken-mail-app
    restart: unless-stopped
    environment:
      PORT: 3000
    expose:
      - "3000"
    ports:
      - "25:25"
    deploy:
      resources:
        limits:
          memory: 300M

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: forsaken-mail-nginx
    restart: unless-stopped
    depends_on:
      - app
    environment:
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:-admin}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-change-me}
      NGINX_PORT: ${NGINX_PORT:-80}
    ports:
      - "${NGINX_PORT:-80}:80"
    deploy:
      resources:
        limits:
          memory: 30M
