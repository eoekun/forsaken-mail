services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forsaken-mail-app
    restart: unless-stopped
    environment:
      MAIL_HOST: ${MAIL_HOST:-}
      SITE_TITLE: ${SITE_TITLE:-Forsaken Mail}
      MAILIN_HOST: ${MAILIN_HOST:-0.0.0.0}
      MAILIN_PORT: ${MAILIN_PORT:-25}
      KEYWORD_BLACKLIST: ${KEYWORD_BLACKLIST:-admin,postmaster,system,webmaster,administrator,hostmaster,service,server,root}
      DINGTALK_WEBHOOK_TOKEN: ${DINGTALK_WEBHOOK_TOKEN:-}
      DINGTALK_WEBHOOK_MESSAGE: ${DINGTALK_WEBHOOK_MESSAGE:-new email received.}
      PORT: 3000
    expose:
      - "3000"
    ports:
      - "25:25"
    deploy:
      resources:
        limits:
          memory: 300M

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: forsaken-mail-nginx
    restart: unless-stopped
    depends_on:
      - app
    environment:
      NGINX_PORT: ${NGINX_PORT:-80}
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:-admin}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-change-me}
    ports:
      - "${NGINX_PORT:-80}:80"
    deploy:
      resources:
        limits:
          memory: 30M
