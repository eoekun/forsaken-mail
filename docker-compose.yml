services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forsaken-mail
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      MAIL_HOST: ${MAIL_HOST:-}
      SITE_TITLE: ${SITE_TITLE:-Forsaken Mail}
      MAILIN_HOST: ${MAILIN_HOST:-0.0.0.0}
      MAILIN_PORT: ${MAILIN_PORT:-25}
      DB_PATH: /data/forsaken-mail.db
      OAUTH_PROVIDER: ${OAUTH_PROVIDER:-github}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      KEYWORD_BLACKLIST: ${KEYWORD_BLACKLIST:-admin,postmaster,system,webmaster,administrator,hostmaster,service,server,root}
      DINGTALK_WEBHOOK_TOKEN: ${DINGTALK_WEBHOOK_TOKEN:-}
      DINGTALK_WEBHOOK_MESSAGE: ${DINGTALK_WEBHOOK_MESSAGE:-new email received.}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${PORT:-3000}:3000"
      - "25:25"
    volumes:
      - forsaken-data:/data
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  forsaken-data:
